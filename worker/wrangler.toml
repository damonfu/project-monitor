name = "project-monitor-api"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# CORS allowed origins - use base domain to match all *.pages.dev previews
ALLOWED_ORIGINS = "project-monitor.pages.dev,localhost:5173,localhost:4173,localhost:8787"

# Static assets - embed data files in the worker
[assets]
directory = "./data"
binding = "ASSETS"

# KV namespace for persistent storage
[[kv_namespaces]]
binding = "KV"
id = "8ecd48160b5b4598aba7a5c53ecb1e1e"
preview_id = "21521805b8fd48708feae03746d7652b"

# Cron trigger for scheduled scans (every 30 minutes)
[triggers]
crons = ["*/30 * * * *"]

# Durable Objects (if needed in future)
# [[durable_objects]]
# binding = "DO"
# class_name = "..."

# Environment variables (set via wrangler secret)
# SCAN_TOKEN - Token for scan API authentication
# FEISHU_WEBHOOK - Optional Feishu webhook URL for notifications
